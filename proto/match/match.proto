syntax = "proto3";

package match;

option go_package = "o7m2/proto/match";

// 订单方向
enum OrderSide {
    ORDER_SIDE_UNSPECIFIED = 0;
    ORDER_SIDE_BUY = 1;
    ORDER_SIDE_SELL = 2;
}

// 订单类型
enum OrderType {
    ORDER_TYPE_UNSPECIFIED = 0;
    ORDER_TYPE_LIMIT = 1;
    ORDER_TYPE_MARKET = 2;
}

// 订单状态
enum OrderStatus {
    ORDER_STATUS_UNSPECIFIED = 0;
    ORDER_STATUS_PENDING = 1;
    ORDER_STATUS_PARTIAL = 2;
    ORDER_STATUS_FILLED = 3;
    ORDER_STATUS_CANCELLED = 4;
}

// 撮合服务
service MatchService {
    // 提交订单
    rpc SubmitOrder(SubmitOrderRequest) returns (SubmitOrderResponse);

    // 取消订单
    rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);

    // 查询订单簿
    rpc GetOrderBook(GetOrderBookRequest) returns (GetOrderBookResponse);

    // 查询最近成交
    rpc GetRecentTrades(GetRecentTradesRequest) returns (GetRecentTradesResponse);

    // 实时行情流
    rpc SubscribeTicker(SubscribeTickerRequest) returns (stream TickerEvent);

    // 实时成交流
    rpc SubscribeTrades(SubscribeTradesRequest) returns (stream TradeEvent);
}

// 提交订单请求
message SubmitOrderRequest {
    string user_id = 1;
    string character_id = 2;
    OrderSide side = 3;
    OrderType type = 4;
    int64 price = 5;
    int64 quantity = 6;
    string client_order_id = 7;
}

// 提交订单响应
message SubmitOrderResponse {
    string order_id = 1;
    OrderStatus status = 2;
    string message = 3;
}

// 取消订单请求
message CancelOrderRequest {
    string user_id = 1;
    string order_id = 2;
}

// 取消订单响应
message CancelOrderResponse {
    bool success = 1;
    string message = 2;
}

// 订单簿查询
message GetOrderBookRequest {
    string character_id = 1;
    int32 depth = 2;
}

message OrderBookLevel {
    int64 price = 1;
    int64 quantity = 2;
    int32 order_count = 3;
}

message GetOrderBookResponse {
    string character_id = 1;
    repeated OrderBookLevel bids = 2;
    repeated OrderBookLevel asks = 3;
    int64 timestamp = 4;
}

// 最近成交查询
message GetRecentTradesRequest {
    string character_id = 1;
    int32 limit = 2;
}

message Trade {
    string id = 1;
    string character_id = 2;
    int64 price = 3;
    int64 quantity = 4;
    OrderSide taker_side = 5;
    int64 timestamp = 6;
}

message GetRecentTradesResponse {
    repeated Trade trades = 1;
}

// 行情订阅
message SubscribeTickerRequest {
    repeated string character_ids = 1;
}

message TickerEvent {
    string character_id = 1;
    int64 last_price = 2;
    int64 open_price = 3;
    int64 high_price = 4;
    int64 low_price = 5;
    int64 volume = 6;
    double change_rate = 7;
    int64 timestamp = 8;
}

// 成交订阅
message SubscribeTradesRequest {
    repeated string character_ids = 1;
}

message TradeEvent {
    string character_id = 1;
    int64 price = 2;
    int64 quantity = 3;
    OrderSide taker_side = 4;
    int64 timestamp = 5;
}
